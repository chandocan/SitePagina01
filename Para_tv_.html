<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequena Semente</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-image: url('fundo.jpg'); /* coloque aqui sua imagem de fundo */
    background-size: cover;
    background-position: center;
    font-family: Arial, sans-serif;
  }

  .container {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .menu button {
    width: 180px;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background-color: rgba(255, 255, 255, 0.8);
    color: #004d00;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    transition: background-color 0.3s;
  }

  .menu button:hover {
    background-color: rgba(255, 255, 255, 1);
  }

  .titulo {
    text-align: right;
    color: #006600;
    font-size: 24px;
    font-weight: bold;
    background-color: rgba(255,255,255,0.7);
    padding: 10px 20px;
    border-radius: 10px;
  }

  .imagem {
    max-width: 800px;   /* largura máxima */
    height: auto;       /* mantém proporção */
  }
</style>
</head>
<body>
  <div class="container">
    <div class="menu">
      <button>Passagem</button>
      <button>Leito</button>
      <button>IA_Biblica</button>
      <button>Busca</button>
      <button>Play</button>
      <button>Shopping</button>
    </div>
    <img src="flores.png" alt="flores" class="imagem" />
    <div class="titulo">A Pequena Semente</div>
  </div>
</body>
</html>
