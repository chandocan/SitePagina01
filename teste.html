<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequena Semente</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-image: url('fundo.jpg'); /* coloque aqui sua imagem de fundo */
    background-size: cover;
    background-position: center;
    font-family: Arial, sans-serif;
    border: 8px solid #004d00; /* borda verde em toda a página */
    box-sizing: border-box;
  }

  .container {
    display: flex;
    height: 100vh;
    align-items: flex-start;
    justify-content: space-between;
    padding: 0 5%;
    position: relative;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 80px; /* espaço abaixo do título */
  }

  .menu button {
    width: 180px;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background-color: rgba(255, 255, 255, 0.8);
    color: #004d00;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    transition: background-color 0.3s;
  }

  .menu button:hover {
    background-color: rgba(255, 255, 255, 1);
  }

  .titulo {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #006600;
    font-size: 28px;
    font-weight: bold;
    background-color: rgba(255,255,255,0.8);
    padding: 12px 25px;
    border-radius: 12px;
    border: 2px solid #006600;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  }

  .imagem {
    max-width: 500px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .texto {
    width: 500px;
    height: 200px;
    margin: 20px auto 0 auto; /* centraliza abaixo da imagem */
    padding: 15px;
    border: 2px solid #004d00;
    border-radius: 10px;
    background-color: rgba(255,255,255,0.8);
    font-size: 16px;
    display: block;
    resize: none;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="menu">
      <button>Passagem</button>
      <button>Leito</button>
      <button>IA_Biblica</button>
      <button>Busca</button>
      <button>Play</button>
      <button>Shopping</button>
    </div>

    <div style="flex:1; text-align:center;">
      <img src="flores.png" alt="flores" class="imagem" />
      <textarea class="texto" placeholder="Digite aqui suas anotações..."></textarea>
    </div>

    <div class="titulo">A Pequena Semente</div>
  </div>
</body>
</html>
